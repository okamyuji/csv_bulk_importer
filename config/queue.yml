# Solid Queue 自体もディスパッチャ・ワーカーのポーリングで DB コネクションを別途消費する。
# 接続枯渇を避けるため、database.yml の pool は (threads + 1) * processes 以上を目安にする。
# 例: threads=5, processes=3 のときは pool >= 18 を確保する。
default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: "*"
      threads: 3
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.1

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
