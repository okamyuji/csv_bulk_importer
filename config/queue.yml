<%
require Rails.root.join("lib/cpu_concurrency").to_s
%># Solid Queue の並列度は CpuConcurrency (lib/cpu_concurrency.rb) が
# CPU 数 (cgroup quota 優先) から自動算出する。ECS Fargate の vCPU 設定や
# ローカル PC のコア数を反映するため、本番/開発で同じ式が動く。
#
# 上書きする ENV:
#   JOB_THREADS      : 1 ワーカープロセスあたりのスレッド数
#   JOB_CONCURRENCY  : ワーカープロセス数
#
# DB 接続枯渇を避けるため database.yml の pool は CpuConcurrency.db_pool を使う。
default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: "*"
      threads: <%= CpuConcurrency.job_threads %>
      processes: <%= CpuConcurrency.job_processes %>
      polling_interval: 0.1

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
