services:
  minio:
    image: minio/minio:latest
    container_name: bulk-file-importer-minio
    ports:
      - "4566:9000"   # アプリの S3_ENDPOINT 互換性のため 4566 を維持
      - "9001:9001"   # MinIO Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-adminuser}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-adminpass1234}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - mysql8_default

  # 起動時に bucket と svc account (test/testtest1234) を作成し、その後終了する。
  # ここでアプリが期待する access_key/secret を root と分けて作ることで、
  # アプリ側の AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY をそのまま使える。
  minio-init:
    image: minio/mc:latest
    container_name: bulk-file-importer-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-adminuser}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-adminpass1234}
      APP_ACCESS_KEY: ${AWS_ACCESS_KEY_ID:-test}
      APP_SECRET_KEY: ${AWS_SECRET_ACCESS_KEY:-testtest1234}
      APP_BUCKET: ${S3_BUCKET:-bulk-file-importer-dev}
    entrypoint: >-
      /bin/sh -c "
        set -e;
        mc alias set local http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\";
        mc mb --ignore-existing local/$$APP_BUCKET;
        mc version enable local/$$APP_BUCKET || true;
        mc admin user svcacct add --access-key \"$$APP_ACCESS_KEY\" --secret-key \"$$APP_SECRET_KEY\" local \"$$MINIO_ROOT_USER\" || echo '[minio-init] svc account already exists';
        echo '[minio-init] bucket ready: '$$APP_BUCKET;
      "
    networks:
      - mysql8_default

volumes:
  minio_data:

networks:
  mysql8_default:
    external: true
