pre-commit:
  parallel: false
  commands:
    rubocop:
      glob: "*.{rb,rake,ru}"
      run: bundle exec rubocop --force-exclusion {staged_files}
    syntax_tree:
      glob: "*.{rb,rake,ru}"
      run: bundle exec stree check {staged_files}
    sorbet:
      glob: "*.rb"
      run: bundle exec srb tc
    erb_lint:
      glob: "*.erb"
      run: bundle exec erb_lint {staged_files}

    frontend_eslint:
      root: "frontend/"
      glob: "frontend/**/*.{ts,tsx,js,jsx}"
      run: pnpm --dir frontend exec eslint {staged_files}
    frontend_prettier:
      root: "frontend/"
      glob: "frontend/**/*.{ts,tsx,css,json}"
      run: pnpm --dir frontend exec prettier --check {staged_files}
    frontend_typecheck:
      glob: "frontend/**/*.{ts,tsx}"
      run: pnpm --dir frontend typecheck
    frontend_stylelint:
      glob: "frontend/**/*.css"
      run: pnpm --dir frontend exec stylelint {staged_files}

pre-push:
  commands:
    specs:
      run: bundle exec rspec --fail-fast
